# Définition des services de l'application
services:

  # Base de données PostgreSQL
  dbPostgres:
    image: postgres:13
    container_name: postgresdb
    restart: always
    environment:
      POSTGRES_USER: workshops_user
      POSTGRES_PASSWORD: oc2024
      POSTGRES_DB: workshopsdb
    ports:
      - "5432:5432"
    networks:
      - Workshop

  # Service backend Spring Boot
  wowapi:
    container_name: back_wowapi
    build: .
    ports:
      - "8080:8080"
    networks:
      - Workshop

# Réseau partagé entre les services
networks:
  Workshop:
    driver: bridge