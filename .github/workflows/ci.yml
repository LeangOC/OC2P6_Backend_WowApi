# Permissions requises pour le workflow
permissions:
  contents: write
  checks: write
  packages: write
  issues: write
  pull-requests: write

# Définition du workflow CI
name: Continuous Integration
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

# Définition des différents jobs
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # Récupération du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # Détection automatique du type de projet
      - name: Detect project type
        id: detect
        shell: bash
        run: |
          if [ -f "package.json" ]; then
            echo "project_type=angular" >> "$GITHUB_OUTPUT"
          elif [ -f "build.gradle" ]; then
            echo "project_type=spring" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported project"
            exit 1
          fi

      # (Temporaire) Affichage du type détecté
      - name: Display detected project
        run: echo "Detected project = ${{ steps.detect.outputs.project_type }}"

      # Installation de Node.js uniquement pour Angular
      - name: Setup Node.js
        if: steps.detect.outputs.project_type == 'angular'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Installation de Java uniquement pour Spring Boot
      - name: Setup Java
        if: steps.detect.outputs.project_type == 'spring'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # Donner les droits d'exécution au script
      - name: Make test script executable
        run: chmod +x run-tests.sh

      # Exécuter les tests
      - name: Run tests
        run: ./run-tests.sh

      # Publication des rapports
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      # Publication des résultats des tests sur GitHub
      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit Tests
          path: test-results/*.xml
          reporter: java-junit

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest

    # Choisir develop ou main selon la stratégie
    if: github.ref == 'refs/heads/main'

    steps:
      # Récupération du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installation de Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20


      # Installation de semantic-release et de ses plugins
      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/github \
            @semantic-release/git

      # Génération automatique de la release
      - name: Run semantic-release (without dry run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # Vérification du lancement de la release
      - name: Release placeholder
        run: echo "Release job started"


  build:
    name: Build Docker Image
    needs: release
    runs-on: ubuntu-latest

    steps:
      # Récupération du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Normalisation du nom de l'image Docker
      - name: Normalize image name
        run: |
          echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Récupération des tags Git
      - name: Fetch tags
        run: git fetch --tags

      # Récupération de la dernière version
      - name: Get latest version
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      # Installation de Java si projet Spring
      - name: Setup Java
        if: hashFiles('build.gradle') != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # Autoriser l'exécution de Gradle
      - name: Make Gradle executable
        if: hashFiles('gradlew') != ''
        run: chmod +x gradlew

      # Compilation du projet Spring Boot
      - name: Build Spring Boot WAR
        if: hashFiles('build.gradle') != ''
        run: ./gradlew bootWar

      # Connexion au registre GitHub
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Construction et publication de l'image Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
